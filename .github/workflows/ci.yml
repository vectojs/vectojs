name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Install FFmpeg and deterministic browser-test fonts
        run: >-
          sudo apt-get update && sudo apt-get install --yes --no-install-recommends
          ffmpeg fonts-noto-core fonts-noto-color-emoji
      - name: Run math unit tests
        run: cd packages/math && bunx vitest run
      - name: Run text unit tests
        run: cd packages/text && bunx vitest run
      - name: Run layout unit tests
        run: cd packages/layout && bunx vitest run
      - name: Run animation unit tests
        run: cd packages/animation && bunx vitest run
      - name: Run core unit tests
        run: cd packages/core && bunx vitest run
      - name: Run ui unit tests
        run: cd packages/ui && bunx vitest run
      - name: Run markdown unit tests
        run: cd packages/markdown && bunx vitest run
      - name: Run three unit tests
        run: cd packages/three && bunx vitest run
      - name: Run devtools unit tests
        run: cd packages/devtools && bunx vitest run
      - name: Run graph3d unit tests
        run: cd packages/graph3d && bunx vitest run
      - name: Run video exporter tests
        env:
          VECTO_CHROMIUM_NO_SANDBOX: "1"
        run: cd packages/video-exporter && bunx vitest run
      - name: Format check (oxfmt)
        run: bun run format:check
      - name: Lint (oxlint)
        run: bunx oxlint packages/math/src packages/text/src packages/layout/src packages/animation/src packages/core/src packages/ui/src packages/markdown/src packages/three/src packages/video-exporter/src packages/devtools/src packages/graph3d/src
      - name: Lint Markdown (markdownlint)
        run: bun run lint:md
      - name: Lint GitHub Actions (actionlint)
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
      - name: Performance micro-benchmark (accessor write gate)
        run: bun run scripts/bench-danmaku.ts
      - name: Build packages
        run: |
          cd packages/math && bun run build
          cd ../text && bun run build
          cd ../layout && bun run build
          cd ../animation && bun run build
          cd ../core && bun run build
          cd ../ui && bun run build
          cd ../markdown && bun run build
          cd ../devtools && bun run build
          cd ../three && bun run build
          cd ../video-exporter && bun run build
          cd ../graph3d && bun run build
      - name: Install Firefox for cross-browser text projection tests
        id: setup-firefox
        uses: browser-actions/setup-firefox@v1
      - name: Browser e2e (HiDPI, selection, RTL, and font substitution)
        # Chrome comes from the hosted runner. Firefox is resolved from the
        # setup action output, then the suite also exercises Noto Serif and
        # forced-color profiles.
        env:
          FIREFOX_EXECUTABLE_PATH: ${{ steps.setup-firefox.outputs.firefox-path }}
        run: cd packages/core && bun run test:e2e
      - name: DevTools event trace e2e
        run: cd packages/devtools && bun run test:e2e

  wasm:
    name: WASM core (build + differential tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # rustup reads crates/vectojs-core-rs/rust-toolchain.toml and provisions
      # the stable channel, the wasm32-unknown-unknown target, and clippy +
      # rustfmt with zero manual `rustup target add`. Pin the action to a
      # release tag so a compromised upstream default can't run on CI.
      - name: Provision Rust toolchain from rust-toolchain.toml
        uses: dtolnay/rust-toolchain@stable
        with:
          # Belt-and-suspenders: rust-toolchain.toml already declares these, but
          # naming them here means the target/components are present even if the
          # action ever stops honouring the file.
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - name: Cache cargo registry + wasm build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/vectojs-core-rs/target
          key: wasm-cargo-${{ runner.os }}-${{ hashFiles('crates/vectojs-core-rs/Cargo.lock') }}
          restore-keys: wasm-cargo-${{ runner.os }}-
      - name: Rust format check
        run: cargo fmt --manifest-path crates/vectojs-core-rs/Cargo.toml --check
      # clippy runs against the real wasm target and with the same RUSTFLAGS the
      # build uses, so lint sees exactly the cfg/target-feature the shipped
      # artifact is compiled with. --deny-warnings mirrors the oxlint gate.
      - name: Rust clippy (wasm32)
        env:
          RUSTFLAGS: "-C target-cpu=generic -C target-feature=+simd128 -C linker=rust-lld"
        run: >-
          cargo clippy --manifest-path crates/vectojs-core-rs/Cargo.toml
          --release --target wasm32-unknown-unknown -- -D warnings
      # The one sanctioned build path (see the script's header): env RUSTFLAGS
      # REPLACES config rustflags, so a global ~/.cargo/config.toml can't leak
      # host CPU flags / mold into the wasm link. Emits
      # packages/core/src/wasm/vectojs_core.wasm (gitignored).
      - name: Build WASM core
        run: crates/vectojs-core-rs/build.sh
      - name: Install dependencies
        run: bun install
      # With the .wasm now present, the 10 core WASM test files that otherwise
      # `describe.skipIf(!haveWasm)` themselves out actually run — this is what
      # turns "the crate still compiles" into "the crate still produces a binary
      # that is bit-for-bit correct against the JS fallback". Without this job
      # those differential tests silently pass by being skipped.
      - name: Run core WASM differential tests
        run: cd packages/core && bunx vitest run test/wasm
