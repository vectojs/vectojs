name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    env:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Install FFmpeg and deterministic browser-test fonts
        run: >-
          sudo apt-get update && sudo apt-get install --yes --no-install-recommends
          ffmpeg fonts-noto-core fonts-noto-color-emoji
      - name: Run core unit tests
        run: cd packages/core && bunx vitest run
      - name: Run ui unit tests
        run: cd packages/ui && bunx vitest run
      - name: Run three unit tests
        run: cd packages/three && bunx vitest run
      - name: Run devtools unit tests
        run: cd packages/devtools && bunx vitest run
      - name: Run graph3d unit tests
        run: cd packages/graph3d && bunx vitest run
      - name: Run video exporter tests
        env:
          VECTO_CHROMIUM_NO_SANDBOX: '1'
        run: cd packages/video-exporter && bunx vitest run
      - name: Lint
        run: bunx oxlint packages/core/src packages/ui/src packages/three/src packages/video-exporter/src packages/devtools/src packages/graph3d/src
      - name: Build packages
        run: |
          cd packages/core && bun run build
          cd ../ui && bun run build
          cd ../devtools && bun run build
          cd ../three && bun run build
          cd ../video-exporter && bun run build
          cd ../graph3d && bun run build
      - name: Install Firefox for cross-browser text projection tests
        id: setup-firefox
        uses: browser-actions/setup-firefox@v1
      - name: Browser e2e (HiDPI, selection, RTL, and font substitution)
        # Chrome comes from the hosted runner. Firefox is resolved from the
        # setup action output, then the suite also exercises Noto Serif and
        # forced-color profiles.
        env:
          FIREFOX_EXECUTABLE_PATH: ${{ steps.setup-firefox.outputs.firefox-path }}
        run: cd packages/core && bun run test:e2e
      - name: DevTools event trace e2e
        run: cd packages/devtools && bun run test:e2e
