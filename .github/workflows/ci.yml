name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Run core unit tests
        run: cd packages/core && bunx vitest run
      - name: Run ui unit tests
        run: cd packages/ui && bunx vitest run
      - name: Lint
        run: bunx oxlint packages/core/src packages/ui/src
      - name: Build packages
        run: |
          cd packages/core && bun run build
          cd ../ui && bun run build
