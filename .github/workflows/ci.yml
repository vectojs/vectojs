name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Install FFmpeg for video exporter integration tests
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - name: Run core unit tests
        run: cd packages/core && bunx vitest run
      - name: Run ui unit tests
        run: cd packages/ui && bunx vitest run
      - name: Run three unit tests
        run: cd packages/three && bunx vitest run
      - name: Run video exporter tests
        env:
          VECTO_CHROMIUM_NO_SANDBOX: '1'
        run: cd packages/video-exporter && bunx vitest run
      - name: Lint
        run: bunx oxlint packages/core/src packages/ui/src packages/three/src packages/video-exporter/src
      - name: Build packages
        run: |
          cd packages/core && bun run build
          cd ../ui && bun run build
          cd ../three && bun run build
          cd ../video-exporter && bun run build
      - name: HiDPI e2e (deviceScaleFactor 2)
        # Uses the runner's preinstalled Chrome; the script resolves
        # PUPPETEER_EXECUTABLE_PATH → /usr/bin/chromium → /usr/bin/google-chrome.
        run: cd packages/core && bun run test:e2e
