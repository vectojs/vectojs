<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Cyan to Magenta Hybrid Gradient -->
    <linearGradient id="vectoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ff00aa" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background (Optional, just to ensure it looks good as an icon) -->
  <rect width="100" height="100" rx="20" fill="#0a0a0f" />

  <!-- Neural Net Sub-edges -->
  <line x1="25" y1="30" x2="75" y2="30" stroke="rgba(0, 240, 255, 0.4)" stroke-width="2" stroke-dasharray="4 4" />
  <line x1="50" y1="30" x2="50" y2="75" stroke="rgba(255, 0, 170, 0.4)" stroke-width="2" stroke-dasharray="2 4" />

  <!-- The Vecto 'V' Path -->
  <path d="M 25 30 L 50 75 L 75 30" fill="none" stroke="url(#vectoGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- The Core Nodes -->
  <!-- WebGL Node (Cyan) -->
  <circle cx="25" cy="30" r="7" fill="#00f0ff" />
  
  <!-- Canvas/DOM Node (Magenta) -->
  <circle cx="75" cy="30" r="7" fill="#ff00aa" />
  
  <!-- Nexus Convergence Node (White) -->
  <circle cx="50" cy="75" r="9" fill="#ffffff" />
  
  <!-- Floating Mini Node -->
  <circle cx="50" cy="30" r="3" fill="#ffffff" opacity="0.8" />
</svg>
