<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Dark App-Icon Background -->
  <rect width="100" height="100" rx="22" fill="#0a0a0f" />

  <!-- Definition for negative space cutouts -->
  <defs>
    <mask id="nodeCutout">
      <rect width="100" height="100" fill="white" />
      <g fill="black">
        <circle cx="50" cy="12" r="8.5" />
        <circle cx="26" cy="32" r="8.5" />
        <circle cx="74" cy="32" r="8.5" />
        <circle cx="50" cy="32" r="8.5" />
        <circle cx="12" cy="56" r="8.5" />
        <circle cx="88" cy="56" r="8.5" />
        <circle cx="50" cy="56" r="8.5" />
        <circle cx="22" cy="88" r="8.5" />
        <circle cx="78" cy="88" r="8.5" />
      </g>
    </mask>
  </defs>

  <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Vector Graph Lines (Masked to avoid nodes) -->
    <g stroke-width="5" mask="url(#nodeCutout)" fill="none">
      <!-- Top Sweep & Horizontal -->
      <path d="M 50 12 L 26 32 L 74 32" />
      <!-- Central Axis & Left Curve -->
      <path d="M 50 32 L 50 62 Q 50 88 22 88" />
      <!-- Large Horizontal -->
      <path d="M 12 56 L 88 56" />
      <!-- Right Leg -->
      <path d="M 50 56 L 78 88" />
    </g>

    <!-- Neural Nodes (Hollow Rings) -->
    <g stroke-width="3" fill="none">
      <circle cx="50" cy="12" r="4" />
      <circle cx="26" cy="32" r="4" />
      <circle cx="74" cy="32" r="4" />
      <circle cx="50" cy="32" r="4" />
      <circle cx="12" cy="56" r="4" />
      <circle cx="88" cy="56" r="4" />
      <circle cx="50" cy="56" r="4" />
      <circle cx="22" cy="88" r="4" />
      <circle cx="78" cy="88" r="4" />
    </g>
  </g>
</svg>
