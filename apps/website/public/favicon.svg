<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Cyan Neon Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur" />
      <feFlood flood-color="#00f0ff" result="glowColor" />
      <feComposite in="glowColor" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations for Hover Effects */
    .logo-group { cursor: pointer; }
    .face { transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .grid-line { transition: opacity 0.4s ease, stroke 0.4s ease; }
    
    /* Hover State: Illuminate the faces and grid */
    .logo-group:hover .front { opacity: 1 !important; }
    .logo-group:hover .top { opacity: 0.85 !important; }
    .logo-group:hover .side { opacity: 0.35 !important; }
    .logo-group:hover .grid-line {
      opacity: 0.6 !important;
      stroke: #ff00aa;
    }
  </style>
  <!-- Grid Floor (Mathematical Coordinate System) -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.15" stroke-dasharray="2 2" class="grid-line">
    <line x1="20" y1="90" x2="80" y2="55" />
    <line x1="80" y1="55" x2="50" y2="38" />
    <line x1="20" y1="90" x2="8" y2="83" />
  </g>

  <g stroke="#ffffff" stroke-width="0.5" stroke-linejoin="round" class="logo-group" filter="url(#neonGlow)">
    <!-- 1. Inner Left Face -->
    <polygon points="30,26 42,14 56,42 44,54" fill="#ffffff" opacity="0.15" class="face side" />

    <!-- 2. Outer Right Face -->
    <polygon points="74,26 86,14 56,74 44,86" fill="#ffffff" opacity="0.15" class="face side" />

    <!-- 3. Front Face -->
    <polygon points="14,26 30,26 44,54 58,26 74,26 44,86" fill="#ffffff" opacity="0.95" class="face front" />

    <!-- 4. Top Left Face -->
    <polygon points="14,26 26,14 42,14 30,26" fill="#ffffff" opacity="0.6" class="face top" />

    <!-- 5. Top Right Face -->
    <polygon points="58,26 70,14 86,14 74,26" fill="#ffffff" opacity="0.6" class="face top" />
  </g>
</svg>
