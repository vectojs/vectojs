<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Cyan to Magenta Hybrid Gradient -->
    <linearGradient id="vectoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#ff00aa" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Subtle breathing animation similar to React's spin */
    .orbits {
      animation: spin 20s linear infinite;
      transform-origin: 50px 50px;
    }
    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
    .orbit-path {
      stroke-dasharray: 200;
      animation: dash 5s linear infinite;
    }
    @keyframes dash {
      to { stroke-dashoffset: -400; }
    }
  </style>

  <g filter="url(#neonGlow)">
    <!-- Orbital Rings (React Style) -->
    <g class="orbits" stroke="url(#vectoGrad)" stroke-width="3" fill="none">
      <ellipse cx="50" cy="50" rx="42" ry="16" class="orbit-path" />
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(60 50 50)" class="orbit-path" />
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(120 50 50)" class="orbit-path" />
    </g>

    <!-- Central Nucleus (The 'V') -->
    <path d="M 38 40 L 50 60 L 62 40" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Central Power Node -->
    <circle cx="50" cy="60" r="3" fill="#00f0ff" />
    <circle cx="38" cy="40" r="3" fill="#ff00aa" />
    <circle cx="62" cy="40" r="3" fill="#ff00aa" />
  </g>
</svg>
